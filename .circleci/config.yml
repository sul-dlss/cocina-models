version: 2.1
orbs:
  ruby-rails: sul-dlss/ruby-rails@4.6.0
workflows:
  build:
    jobs:
      - ruby-rails/lint:
          name: lint
      - ruby-rails/test-gem:
          name: test
          context: dlss
          before-test:
            - run:
                name: validate schema
                command: bin/validate-schema schema.json
